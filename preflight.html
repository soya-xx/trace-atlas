<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#25785e">
    <meta name="description" content="Trace Atlas 发布前自检页：检查行动包页面、分享卡、反馈榜、材料 API、行动包 JSON 和验证摘要是否在线。">
    <meta property="og:type" content="website">
    <meta property="og:locale" content="zh_CN">
    <meta property="og:title" content="Trace Atlas 发布前自检">
    <meta property="og:description" content="打开页面即可检查公开材料，并复制一段发布前证据文本。">
    <meta property="og:url" content="https://trace-atlas-codex.pages.dev/preflight">
    <meta property="og:image" content="https://trace-atlas-codex.pages.dev/promo/pack-publish-card.svg">
    <meta name="twitter:card" content="summary_large_image">
    <meta name="twitter:title" content="Trace Atlas 发布前自检">
    <meta name="twitter:description" content="检查包页、分享卡、反馈榜、JSON 和验证摘要，复制发布前证据文本。">
    <meta name="twitter:image" content="https://trace-atlas-codex.pages.dev/promo/pack-publish-card.svg">
    <title>Trace Atlas 发布前自检</title>
    <link rel="icon" href="./icon.svg" type="image/svg+xml">
    <link rel="stylesheet" href="./launch.css?v=13">
  </head>
  <body>
    <main class="launch-shell preflight-shell" aria-labelledby="preflight-title">
      <section class="intro route-intro">
        <p class="eyebrow">Trace Atlas / 发布前自检</p>
        <h1 id="preflight-title">发布前自检</h1>
        <p class="lead">检查 4 个行动包页面、分享卡、反馈榜、公开 FAQ、材料 API、行动包 JSON 和验证摘要。通过后可以复制一段证据文本，回写到 issue 或发帖记录里。</p>
        <div class="primary-links" aria-label="自检相关入口">
          <a href="./pack-publish.html">发帖发布包</a>
          <a href="./feedback.html">反馈问题榜</a>
          <a href="./faq.html">公开 FAQ</a>
          <a href="./materials-guide.html">材料选择器</a>
          <a href="./materials-packs.json">行动包 JSON</a>
          <a href="./verification-summary.md">验证摘要</a>
          <a href="./materials.html">材料总览</a>
          <a href="https://github.com/soya-xx/trace-atlas/issues/1">工作日志</a>
        </div>
      </section>

      <section class="preflight-panel" aria-labelledby="preflight-panel-title">
        <div>
          <p class="eyebrow">自动检查</p>
          <h2 id="preflight-panel-title">公开材料是否可用</h2>
          <p id="preflight-status" class="copy-status" aria-live="polite">自检准备中。</p>
        </div>
        <div class="preflight-actions">
          <button id="rerun-preflight" class="copy-button" type="button">重新检查</button>
          <button id="copy-preflight" class="copy-button" type="button" disabled>复制报告</button>
        </div>
      </section>

      <section class="preflight-list" id="preflight-list" aria-label="自检结果"></section>

      <section class="preflight-report" aria-labelledby="preflight-report-title">
        <div class="guide-results-head">
          <div>
            <p class="eyebrow">可复制报告</p>
            <h2 id="preflight-report-title">发布前证据文本</h2>
          </div>
          <a href="./public-health.json">打开健康 JSON</a>
        </div>
        <pre id="preflight-report">等待自检结果。</pre>
      </section>

      <section class="publish-record" aria-labelledby="publish-record-title">
        <div class="guide-results-head">
          <div>
            <p class="eyebrow">发布后回流</p>
            <h2 id="publish-record-title">发布记录模板</h2>
          </div>
          <div class="preflight-actions">
            <button id="copy-record" class="copy-button" type="button">复制发布记录</button>
            <button id="copy-record-json" class="copy-button" type="button">复制 JSON</button>
          </div>
        </div>
        <div class="record-grid">
          <label class="record-field">
            <span>小红书链接</span>
            <input id="record-url" type="url" placeholder="https://www.xiaohongshu.com/..." autocomplete="off">
          </label>
          <label class="record-field">
            <span>发布时间</span>
            <input id="record-time" type="datetime-local">
          </label>
          <label class="record-field">
            <span>当前状态</span>
            <select id="record-status">
              <option>待发布</option>
              <option>已发布</option>
              <option>已回流</option>
            </select>
          </label>
          <label class="record-field record-wide">
            <span>评论与问题</span>
            <textarea id="record-feedback" rows="4" placeholder="记录读者问了什么、哪里没看懂、哪些链接被点击或收藏。"></textarea>
          </label>
          <label class="record-field record-wide">
            <span>处理动作</span>
            <textarea id="record-action" rows="4" placeholder="记录已经补充的页面、修正的文案、回写的 issue 或下一次要验证的假设。"></textarea>
          </label>
          <label class="record-field record-wide">
            <span>下一步</span>
            <textarea id="record-next" rows="3" placeholder="写下下一次迭代最小动作。"></textarea>
          </label>
        </div>
        <pre id="publish-record-output">等待填写发布记录。</pre>
        <pre id="publish-record-json-output">等待生成 JSON 草稿。</pre>
      </section>

      <section class="publish-record" aria-labelledby="feedback-rank-title">
        <div class="guide-results-head">
          <div>
            <p class="eyebrow">多次发布</p>
            <h2 id="feedback-rank-title">反馈问题榜</h2>
          </div>
          <button id="copy-feedback-rank" class="copy-button" type="button">复制问题榜</button>
        </div>
        <label class="record-field record-wide">
          <span>发布记录 JSON</span>
          <textarea id="record-history" rows="7" placeholder="粘贴 JSON 数组，或每行一条发布记录 JSON。"></textarea>
        </label>
        <pre id="feedback-rank-output">等待发布记录 JSON。</pre>
      </section>
    </main>
    <script src="./preflight.js?v=6"></script>
  </body>
</html>
