<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Trace Atlas 小红书封面</title>
    <style>
      :root {
        --ink: #101113;
        --muted: #606763;
        --paper: #fbfbf8;
        --line: #d6ddd8;
        --green: #25785e;
        --blue: #386fb0;
        --red: #b84646;
        --gold: #c9961a;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        width: 900px;
        height: 1200px;
        margin: 0;
        overflow: hidden;
        background: var(--paper);
        color: var(--ink);
        font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        position: relative;
        padding: 68px 76px 64px;
      }

      body::before {
        position: absolute;
        inset: 0;
        content: "";
        background-image:
          linear-gradient(var(--line) 1px, transparent 1px),
          linear-gradient(90deg, var(--line) 1px, transparent 1px);
        background-size: 44px 44px;
        opacity: .66;
      }

      .cover {
        position: relative;
        z-index: 1;
        height: 100%;
      }

      .eyebrow {
        margin: 0 0 20px;
        color: var(--muted);
        font-size: 30px;
        font-weight: 900;
        letter-spacing: 0;
      }

      h1 {
        max-width: 720px;
        margin: 0;
        font-size: 90px;
        line-height: .98;
        letter-spacing: 0;
      }

      .highlight {
        color: var(--green);
      }

      .sub {
        max-width: 680px;
        margin: 22px 0 0;
        color: var(--muted);
        font-size: 31px;
        font-weight: 750;
        line-height: 1.35;
      }

      .map {
        width: 640px;
        height: 344px;
        margin: 28px auto 0;
        border: 4px solid var(--ink);
        border-radius: 18px;
        background: rgba(255, 255, 255, .78);
        box-shadow: 0 30px 70px rgba(16, 17, 19, .16);
      }

      .map svg {
        width: 100%;
        height: 100%;
        display: block;
      }

      .chips {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-top: 28px;
      }

      .chip {
        min-height: 62px;
        border: 3px solid var(--ink);
        border-radius: 12px;
        padding: 13px 18px;
        background: white;
        font-size: 24px;
        font-weight: 900;
      }

      .footer {
        display: flex;
        align-items: flex-end;
        justify-content: space-between;
        gap: 28px;
        margin-top: 18px;
      }

      .footer strong,
      .footer span {
        display: block;
      }

      .footer strong {
        font-size: 28px;
        line-height: 1.1;
      }

      .footer span {
        margin-top: 8px;
        color: var(--muted);
        font-size: 20px;
        font-weight: 750;
      }

      .stamp {
        display: grid;
        place-items: center;
        width: 116px;
        height: 116px;
        border: 4px solid var(--ink);
        border-radius: 50%;
        background: var(--green);
        color: white;
        font-size: 21px;
        font-weight: 950;
        text-align: center;
        line-height: 1.12;
        transform: rotate(-7deg);
      }
    </style>
  </head>
  <body>
    <main class="cover">
      <section>
        <p class="eyebrow">TRACE ATLAS / 痕迹星图</p>
        <h1>我把 <span class="highlight">AI 会话</span><br>做成了网站</h1>
        <p class="sub">公开部署、来路账本、自动验证，一个能继续种下痕迹的小作品。</p>
      </section>

      <section class="map" aria-label="痕迹星图示意">
        <svg viewBox="0 0 640 420" role="img" aria-labelledby="map-title">
          <title id="map-title">Trace Atlas 星图示意</title>
          <path d="M122 230 Q 240 94 334 190 T 518 120" fill="none" stroke="#101113" stroke-width="4" opacity=".28"/>
          <path d="M142 288 Q 292 354 404 258 T 556 300" fill="none" stroke="#25785e" stroke-width="5" opacity=".3"/>
          <g transform="translate(206 164)">
            <rect x="-45" y="-45" width="90" height="90" rx="8" transform="rotate(45)" fill="#25785e" stroke="#101113" stroke-width="5"/>
            <circle r="80" fill="none" stroke="#101113" stroke-width="4"/>
          </g>
          <g transform="translate(388 214)">
            <rect x="-34" y="-34" width="68" height="68" rx="8" transform="rotate(45)" fill="#386fb0" stroke="#101113" stroke-width="5"/>
            <circle r="58" fill="none" stroke="#101113" stroke-width="3" opacity=".8"/>
          </g>
          <g transform="translate(504 304)">
            <rect x="-30" y="-30" width="60" height="60" rx="8" transform="rotate(45)" fill="#c9961a" stroke="#101113" stroke-width="5"/>
            <circle r="50" fill="none" stroke="#101113" stroke-width="3" opacity=".72"/>
          </g>
          <g transform="translate(150 306)">
            <rect x="-27" y="-27" width="54" height="54" rx="8" transform="rotate(45)" fill="#b84646" stroke="#101113" stroke-width="5"/>
            <circle r="46" fill="none" stroke="#101113" stroke-width="3" opacity=".72"/>
          </g>
        </svg>
      </section>

      <section>
        <div class="chips">
          <div class="chip">Cloudflare Pages</div>
          <div class="chip">GitHub Actions</div>
          <div class="chip">来路账本</div>
          <div class="chip">小红书传播包</div>
        </div>
        <div class="footer">
          <div>
            <strong>一次开放式 Codex 实验</strong>
            <span>从聊天框到公开 artifact</span>
          </div>
          <div class="stamp">可打开<br>可验证</div>
        </div>
      </section>
    </main>
  </body>
</html>
