<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trace Atlas 复用接力包分享卡</title>
  <desc id="desc">适合把这套公开化流程带到另一个 AI 会话或作品里，优先保留机器可读数据。</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d6ddd8" stroke-width="1" opacity="0.72"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fbfbf8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="42" y="42" width="1116" height="546" rx="8" fill="#ffffff" stroke="#101113" stroke-width="3"/>
  <rect x="78" y="78" width="238" height="48" rx="8" fill="#101113"/>
  <text x="100" y="111" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900">REUSE PACK</text>
  <text x="78" y="188" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="950"><tspan x="78" dy="0">复用接力包</tspan></text>
  <text x="78" y="388" fill="#606763" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760"><tspan x="78" dy="0">适合把这套公开化流程带到另一个 AI 会话或作品里</tspan><tspan x="78" dy="42">，优先保留机器可读数据。</tspan></text>
  <g transform="translate(792 106)">
    <rect width="288" height="288" rx="8" fill="#101113" opacity="0.96"/>
    <circle cx="88" cy="88" r="48" fill="#ffffff" opacity="0.92"/>
    <circle cx="200" cy="96" r="30" fill="#25785e"/>
    <path d="M 76 198 C 120 132 178 144 220 204" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
    <text x="42" y="258" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="950">10 LINKS</text>
  </g>
  <text x="78" y="520" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="860"><tspan x="78" dy="0">把 JSON 和模板作为起点，按自己的项目改写目</tspan><tspan x="78" dy="36">标、边界和验证方式。</tspan></text>
  <text x="792" y="508" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="950">trace-atlas-codex.pages.dev</text>
  <text x="792" y="548" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="950">/pack-reuse</text>
</svg>
