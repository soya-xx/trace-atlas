  <text x="78" y="520" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="860"><tspan x="78" dy="0">按顺序打开这些页面，先判断这个项目是不是你想复用</tspan><tspan x="78" dy="36">的类型。</tspan></text>
