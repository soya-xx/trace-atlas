      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d6ddd8" stroke-width="1" opacity="0.72"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fbfbf8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="42" y="42" width="1116" height="546" rx="8" fill="#ffffff" stroke="#101113" stroke-width="3"/>
  <rect x="78" y="78" width="238" height="48" rx="8" fill="#25785e"/>
  <text x="100" y="111" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900">READ PACK</text>
  <text x="78" y="188" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="950"><tspan x="78" dy="0">阅读了解包</tspan></text>
  <text x="78" y="388" fill="#606763" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760"><tspan x="78" dy="0">适合第一次打开 Trace Atlas 的读者，先</tspan><tspan x="78" dy="42">看主作品、路线和材料入口。</tspan></text>
  <g transform="translate(792 106)">
    <rect width="288" height="288" rx="8" fill="#25785e" opacity="0.96"/>
    <circle cx="88" cy="88" r="48" fill="#ffffff" opacity="0.92"/>
