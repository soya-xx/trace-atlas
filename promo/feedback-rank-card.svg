<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trace Atlas 反馈问题榜分享卡</title>
  <desc id="desc">把发布记录 JSON 汇总成高频问题、下一步和公开证据。</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d6ddd8" stroke-width="1" opacity="0.72"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fbfbf8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="42" y="42" width="1116" height="546" rx="8" fill="#ffffff" stroke="#101113" stroke-width="3"/>
  <rect x="78" y="78" width="268" height="48" rx="8" fill="#25785e"/>
  <text x="100" y="111" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900">FEEDBACK RANK</text>
  <text x="78" y="190" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="950">
    <tspan x="78" dy="0">反馈问题榜</tspan>
    <tspan x="78" dy="86">公开回流</tspan>
  </text>
  <text x="78" y="386" fill="#606763" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760">
    <tspan x="78" dy="0">发布记录 JSON 不只存档。</tspan>
    <tspan x="78" dy="42">重复问题会变成下一轮路线。</tspan>
  </text>
  <g transform="translate(792 96)">
    <rect width="288" height="330" rx="8" fill="#101113"/>
    <rect x="34" y="42" width="220" height="36" rx="8" fill="#ffffff"/>
    <rect x="34" y="112" width="176" height="28" rx="8" fill="#25785e"/>
    <rect x="34" y="168" width="210" height="28" rx="8" fill="#386fb0"/>
    <rect x="34" y="224" width="146" height="28" rx="8" fill="#c9961a"/>
    <text x="34" y="298" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="30" font-weight="950">3 RECORDS</text>
  </g>
  <text x="78" y="520" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="860">
    <tspan x="78" dy="0">高频问题 / 下一步动作 / 证据入口</tspan>
    <tspan x="78" dy="36">都可以复制回 issue 或帖子记录。</tspan>
  </text>
  <text x="792" y="508" fill="#25785e" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="950">trace-atlas-codex.pages.dev</text>
  <text x="792" y="548" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="950">/feedback</text>
</svg>
