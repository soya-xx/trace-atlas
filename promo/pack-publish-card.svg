<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Trace Atlas 发帖发布包分享卡</title>
  <desc id="desc">适合准备小红书或外部平台发布时取用，包含图片、文档、检查清单和证据。</desc>
  <defs>
    <pattern id="grid" width="42" height="42" patternUnits="userSpaceOnUse">
      <path d="M 42 0 L 0 0 0 42" fill="none" stroke="#d6ddd8" stroke-width="1" opacity="0.72"/>
    </pattern>
  </defs>
  <rect width="1200" height="630" fill="#fbfbf8"/>
  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect x="42" y="42" width="1116" height="546" rx="8" fill="#ffffff" stroke="#101113" stroke-width="3"/>
  <rect x="78" y="78" width="238" height="48" rx="8" fill="#386fb0"/>
  <text x="100" y="111" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="24" font-weight="900">PUBLISH PACK</text>
  <text x="78" y="188" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="78" font-weight="950"><tspan x="78" dy="0">发帖发布包</tspan></text>
  <text x="78" y="388" fill="#606763" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="760"><tspan x="78" dy="0">适合准备小红书或外部平台发布时取用，包含图片、文档</tspan><tspan x="78" dy="42">、检查清单和证据。</tspan></text>
  <g transform="translate(792 106)">
    <rect width="288" height="288" rx="8" fill="#386fb0" opacity="0.96"/>
    <circle cx="88" cy="88" r="48" fill="#ffffff" opacity="0.92"/>
    <circle cx="200" cy="96" r="30" fill="#c9961a"/>
    <path d="M 76 198 C 120 132 178 144 220 204" fill="none" stroke="#ffffff" stroke-width="18" stroke-linecap="round"/>
    <text x="42" y="258" fill="#ffffff" font-family="Inter, system-ui, sans-serif" font-size="32" font-weight="950">23 LINKS</text>
  </g>
  <text x="78" y="520" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="27" font-weight="860"><tspan x="78" dy="0">发布前按清单核对链接和配图，正文只使用已经公开验</tspan><tspan x="78" dy="36">证过的事实。</tspan></text>
  <text x="792" y="508" fill="#386fb0" font-family="Inter, system-ui, sans-serif" font-size="25" font-weight="950">trace-atlas-codex.pages.dev</text>
  <text x="792" y="548" fill="#101113" font-family="Inter, system-ui, sans-serif" font-size="31" font-weight="950">/pack-publish</text>
</svg>
